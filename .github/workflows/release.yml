name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version bump (patch/minor/major) or specific version (e.g., 1.4.0)'
        required: true
        default: 'patch'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Determine version
        id: version
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          CURRENT_VERSION=$(git describe --tags --abbrev=0)

          if [[ "$INPUT_VERSION" == "patch" || "$INPUT_VERSION" == "minor" || "$INPUT_VERSION" == "major" ]]; then
            CURRENT_VERSION=${CURRENT_VERSION#v}
            IFS='.' read -r major minor patch <<< "$CURRENT_VERSION"
            case "$INPUT_VERSION" in
              patch) new_version="${major}.${minor}.$((patch + 1))" ;;
              minor) new_version="${major}.$((minor + 1)).0" ;;
              major) new_version="$((major + 1)).0.0" ;;
            esac
          else
            new_version="$INPUT_VERSION"
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "New version: $new_version"
          echo "new_version=$new_version" >> $GITHUB_OUTPUT

      - name: Update version in package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = '${{ steps.version.outputs.new_version }}';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Generate changelog
        run: |
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo '')
          echo "Last tag: $LAST_TAG"

          if [ -n "$LAST_TAG" ]; then
            NOTES=$(git log $LAST_TAG..HEAD --oneline --format='- %s (%h)' | head -20)
          else
            NOTES=$(git log --oneline --format='- %s (%h)' | head -20)
          fi

          cat > /tmp/release_notes.md << 'EOF'
          ## What's Changed

          EOF
          echo "$NOTES" >> /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/$LAST_TAG...v${{ steps.version.outputs.new_version }}" >> /tmp/release_notes.md

      - name: Build extensions
        run: |
          npm run build

      - name: Commit version change
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.new_version }}"
          git push

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new_version }}
          name: Release v${{ steps.version.outputs.new_version }}
          body_path: /tmp/release_notes.md
          draft: true
          prerelease: false
          files: |
            builds/VideoAdGuard-chrome-v*.zip
            builds/VideoAdGuard-firefox-v*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
