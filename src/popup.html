<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
</head>
<body>
  <h3>B站广告检测设置</h3>

  <div class="card checkbox-card">
    <div class="form-group enable-extensions-field">
      <label for="enableExtension">启用插件</label>
      <input type="checkbox" id="enableExtension" checked>
    </div>
    <div class="form-group autoSkipAd-field">
      <label for="autoSkipAd">自动跳过广告</label>
      <input type="checkbox" id="autoSkipAd" checked>
    </div>
    <div class="form-group restrictedMode-field">
      <label for="restrictedMode">限制模式 <span class="info-icon" id="restrictedModeInfo" title="开启后，仅在视频简介/评论中检测到商品链接时才进行广告检测"><span class="info-icon-inner">i</span></span></label>
      <input type="checkbox" id="restrictedMode">
    </div>
  </div>

  <div class="card api-settings-card">
    <div class="form-group provider-field">
      <label for="provider">SDK:</label>
      <div class="api-url-container">
        <input type="hidden" id="provider" value="openai">
        <input type="text" id="providerDisplay" value="OpenAI 兼容" readonly>
        <button type="button" class="dropdown-toggle" id="providerDropdown">▼</button>
        <div class="dropdown-menu" id="providerDropdownMenu"></div>
      </div>
    </div>
    <div class="form-group baseUrl-field">
      <label for="baseUrl">Base url:</label>
      <div class="api-url-container">
        <input type="text" id="baseUrl" placeholder="请选择下拉地址或手动输入" value="">
        <button type="button" class="dropdown-toggle" id="baseUrlDropdown">▼</button>
        <div class="dropdown-menu" id="baseUrlDropdownMenu"></div>
      </div>
    </div>
    <div class="form-group apiKey-field">
      <label for="apiKey">API 密钥:</label>
      <div class="input-with-icon">
        <input type="password" id="apiKey" placeholder="请输入API密钥">
        <span class="toggle-password" id="toggleApiKey">
          <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"></path>
          </svg>
          <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path>
          </svg>
        </span>
      </div>
    </div>
    <div class="form-group model-field">
      <label for="model">模型名称:</label>
      <input type="text" id="model" placeholder="请输入模型名称">
    </div>
  </div>

  <div class="card groq-settings-card">
    <div class="form-group enableAudioTranscription-field">
      <label for="enableAudioTranscription">启用语音识别</label>
      <div class="groq-register-link">
        <a href="https://console.groq.com/keys" target="_blank" class="register-link">注册</a>
      </div>
      <input type="checkbox" id="enableAudioTranscription">
    </div>
    <div class="form-group groq-proxy-field">
      <label for="enableGroqProxy">官方接口失败时使用代理（无网络要求）</label>
      <input type="checkbox" id="enableGroqProxy">
    </div>
    <div class="form-group groqApiKey-field">
      <label for="groqApiKey">Groq 密钥：</label>
      <div class="input-with-icon">
        <input type="password" id="groqApiKey" placeholder="刚需非大陆、非港澳台网络">
        <span class="toggle-password" id="toggleGroqApiKey">
          <svg class="eye-icon eye-open" viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"></path>
          </svg>
          <svg class="eye-icon eye-closed" viewBox="0 0 24 24" width="16" height="16">
            <path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"></path>
          </svg>
        </span>
      </div>
    </div>
  </div>

  <div id="result"></div>
  <div id="message"></div>

  <script src="popup.js"></script>

  <div class="card whitelist-card">
    <div class="form-group whitelist-switch">
      <label for="enableWhitelist">启用UP主白名单</label>
      <input type="checkbox" id="enableWhitelist">
    </div>
    <div class="whitelist-content">
      <div class="whitelist-add">
        <input type="text" id="upUid" placeholder="输入UP主UID">
        <button id="addToWhitelist">添加</button>
      </div>
      <div class="whitelist-list"></div>
    </div>
  </div>

  <style>
    :root {
      --bg-body: #f4f4f4;
      --bg-card: #ffffff;
      --bg-scroll-track: #f7f9fc;
      --bg-scroll-thumb: linear-gradient(180deg, #fff, #ff6699b5);
      --bg-scroll-thumb-hover: linear-gradient(180deg, #E84B85, #ff6699);
      --bg-info-icon: linear-gradient(135deg, #ff6699, #E84B85);
      --bg-info-icon-hover: linear-gradient(135deg, #E84B85, #cc5580);
      --bg-btn: #ff6699;
      --bg-btn-hover: #E84B85;
      --bg-btn-remove: #e72236;
      --bg-success: #d4edda;
      --bg-error: #f8d7da;
      --bg-dropdown-item-hover: #f8f9fa;
      --bg-input: #ffffff;
      --border-light: #eee;
      --border-input: #ccc;
      --text-primary: #333;
      --text-secondary: #666;
      --text-success: #155724;
      --border-success: #c3e6cb;
      --text-error: #721c24;
      --border-error: #f5c6cb;
      --scrollbar-shadow: rgba(0,0,0,0.1);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-body: #1e1e1e;
        --bg-card: #2a2a2a;
        --bg-scroll-track: #2a2a2a;
        --bg-scroll-thumb: linear-gradient(180deg, #444, #ff6699b5);
        --bg-scroll-thumb-hover: linear-gradient(180deg, #E84B85, #ff6699);
        --bg-info-icon: linear-gradient(135deg, #ff6699, #E84B85);
        --bg-info-icon-hover: linear-gradient(135deg, #E84B85, #cc5580);
        --bg-btn: #ff6699;
        --bg-btn-hover: #E84B85;
        --bg-btn-remove: #c41e30;
        --bg-success: #1a3d2b;
        --bg-error: #3d1a1a;
        --bg-dropdown-item-hover: #3a3a3a;
        --bg-input: #333;
        --border-light: #3a3a3a;
        --border-input: #555;
        --text-primary: #e0e0e0;
        --text-secondary: #aaa;
        --text-success: #7dd89a;
        --border-success: #2d5a3d;
        --text-error: #f5a9a9;
        --border-error: #5a2d2d;
        --scrollbar-shadow: rgba(0,0,0,0.3);
      }
    }

    body {
      width: 320px;
      padding: 5px;
      font-family: sans-serif;
      font-size: 14px;
      background-color: var(--bg-body);
      color: var(--text-primary);
      overflow: auto;
    }

    ::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-scroll-track);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--bg-scroll-thumb);
      border-radius: 2px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-scroll-thumb-hover);
    }

    .card {
      background-color: var(--bg-card);
      border-radius: 8px;
      padding: 10px;
      margin-bottom: 10px;
      box-shadow: 0 1px 3px var(--scrollbar-shadow);
    }

    .checkbox-card {
      padding: 0 12px;
    }

    .form-group {
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      width: 100%;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .checkbox-card .form-group {
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 0;
    }

    .checkbox-card .form-group:last-child {
      border-bottom: 0;
    }

    .checkbox-card label {
      flex-basis: auto;
      flex-shrink: 1;
      text-align: left;
      margin-right: 10px;
      font-weight: normal;
      order: 1;
      white-space: nowrap;
      color: var(--text-primary);
    }

    input[type="checkbox"] {
      order: 3;
      margin-left: auto;
      width: 20px !important;
      height: 20px;
      cursor: pointer;
      position: relative;
      background-color: var(--bg-input);
      transition: all 0.2s ease;
      appearance: none;
      border: 2px solid #ff6699;
      border-radius: 4px;
    }

    input[type="checkbox"]:checked::after {
      background-color: #ff6699;
      content: '✓';
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      line-height: 1;
    }

    .info-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      margin-left: 4px;
    }

    .info-icon-inner {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: var(--bg-info-icon);
      color: white;
      font-size: 12px;
      font-style: italic;
      font-family: Georgia, serif;
      line-height: 1;
    }

    .info-icon:hover .info-icon-inner {
      background: var(--bg-info-icon-hover);
    }

    .api-settings-card label {
      flex-basis: 60px;
      flex-shrink: 0;
      text-align: left;
      margin-right: 10px;
      word-break: keep-all;
      font-weight: normal;
      color: var(--text-primary);
    }

    .enableAudioTranscription-field .groq-register-link {
      margin-left: 10px;
    }

    .enableAudioTranscription-field {
      justify-content: space-between;
    }

    .api-url-container {
      position: relative;
      flex-grow: 1;
      width: calc(100% - 90px);
    }

    .api-url-container input[type="text"] {
      width: 100%;
      padding: 8px 35px 8px 8px;
      box-sizing: border-box;
      border: 1px solid var(--border-input);
      border-radius: 4px;
      background-color: var(--bg-input);
      color: var(--text-primary);
    }

    .dropdown-toggle {
      position: absolute;
      right: 8px;
      top: 8px;
      bottom: 8px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      padding: 0;
      width: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }

    .dropdown-toggle:hover {
      color: #ff6699;
      background: none !important;
    }

    .dropdown-menu {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border-input);
      border-radius: 4px;
      box-shadow: 0 2px 8px var(--scrollbar-shadow);
      max-height: 200px;
      overflow-y: auto;
      z-index: 1000;
      display: none;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      padding: 10px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-light);
      transition: background-color 0.2s;
      color: var(--text-primary);
    }

    .dropdown-item:last-child {
      border-bottom: none;
    }

    .dropdown-item:hover {
      background-color: var(--bg-dropdown-item-hover);
    }

    .provider-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .provider-name {
      font-weight: 500;
      color: var(--text-primary);
      font-size: 13px;
    }

    .register-link {
      color: #ff6699;
      text-decoration: none;
      font-size: 12px;
      padding: 2px 6px;
      border: 1px solid #ff6699;
      border-radius: 3px;
      transition: all 0.2s;
    }

    .register-link:hover {
      background-color: #ff6699;
      color: white;
    }

    .api-url {
      font-size: 11px;
      color: var(--text-secondary);
      font-family: monospace;
      word-break: break-all;
      line-height: 1.3;
    }

    .model-field input[type="text"] {
      flex-grow: 1;
      padding: 8px;
      box-sizing: border-box;
      border: 1px solid var(--border-input);
      border-radius: 4px;
      width: calc(100% - 90px);
      background-color: var(--bg-input);
      color: var(--text-primary);
    }

    .input-with-icon {
      position: relative;
      flex-grow: 1;
      width: calc(100% - 90px);
    }

    .input-with-icon input {
      width: 100%;
      padding: 8px;
      padding-right: 35px;
      box-sizing: border-box;
      border: 1px solid var(--border-input);
      border-radius: 4px;
      background-color: var(--bg-input);
      color: var(--text-primary);
    }

    .toggle-password {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      color: var(--text-secondary);
      opacity: 0.7;
      z-index: 2;
    }

    .toggle-password:hover {
      opacity: 1;
    }

    .eye-icon {
      fill: currentColor;
      display: none;
    }

    input[type="password"] ~ .toggle-password .eye-closed {
      display: block;
    }

    input[type="text"] ~ .toggle-password .eye-open {
      display: block;
    }

    .groq-proxy-field {
      display: none;
      transition: opacity 0.3s ease;
    }

    body.audio-transcription-enabled .groq-proxy-field {
      display: flex;
    }

    h3 {
      margin-top: 0;
      text-align: center;
      margin-bottom: 15px;
      color: var(--text-primary);
    }

    button {
      width: 100%;
      padding: 10px;
      background-color: var(--bg-btn);
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 15px;
      margin-top: 3px;
    }

    button:hover {
      background-color: var(--bg-btn-hover);
    }

    #result {
      padding: 8px;
      font-size: 13px;
      text-align: left;
      color: var(--text-primary);
    }

    #message {
      padding: 8px;
      border-radius: 4px;
      font-size: 13px;
      margin-top: 5px;
      text-align: center;
      display: none;
    }

    .success {
      background-color: var(--bg-success);
      color: var(--text-success);
      border: 1px solid var(--border-success);
    }

    .error {
      background-color: var(--bg-error);
      color: var(--text-error);
      border: 1px solid var(--border-error);
    }

    .whitelist-card {
      margin-top: 10px;
    }

    .whitelist-content {
      margin-top: 10px;
      display: none;
    }

    body.whitelist-enabled .whitelist-content {
      display: block;
    }

    .whitelist-add {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    .whitelist-add input {
      flex: 1;
      padding: 8px;
      border: 1px solid var(--border-input);
      border-radius: 4px;
      background-color: var(--bg-input);
      color: var(--text-primary);
    }

    .whitelist-add button {
      margin: 0;
      padding: 8px 8px;
    }

    .whitelist-list {
      max-height: 200px;
      overflow: auto;
    }

    .whitelist-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      border-bottom: 1px solid var(--border-light);
      color: var(--text-primary);
    }

    .whitelist-item:last-child {
      border-bottom: 0;
    }

    .whitelist-item button {
      padding: 2px 2px;
      margin: 0;
      background-color: var(--bg-btn-remove);
      font-size: 12px;
      width: 40px;
      height: 24px;
      min-width: 40px;
      min-height: 24px;
    }
  </style>
</body>
</html>
